<html>

<head>

	<script>
		var saldo = 100.5;
		var nome = "";
		var senha = "3589";
		var extrato = [
			"depósito inicial: r$100.50",
			"compra mercado: -r$50.00",
			"depósito: +r$200.00"
		];

		function inicio() {
			if (nome === "") {
				nome = prompt("qual é seu nome?");
			}

			var escolha = parseInt(prompt(
				'olá ' + nome + ' é um prazer ter você por aqui!\n\n' +
				'1) saldo\n2) extrato\n3) saque\n4) depósito\n5) transferência\n6) sair'
			));

			switch (escolha) {
				case 1:
					ver_saldo();
					break;
				case 2:
					ver_extrato();
					break;
				case 3:
					fazer_saque();
					break;
				case 4:
					fazer_deposito();
					break;
				case 5:
					fazer_transferencia();
					break;
				case 6:
					sair();
					break;
				default:
					erro();
			}
		}

		function pedir_senha(funcao) {
			var senhaDigitada = prompt("digite sua senha:");

			if (senhaDigitada != senha) {
				alert("senha incorreta");
				funcao(); // chama de novo a mesma função
			} else {
				funcao("ok");
			}
		}

		function ver_saldo(status) {
			if (status != "ok") {
				pedir_senha(ver_saldo);
			} else {
				alert('seu saldo atual é: ' + saldo);
				inicio();
			}
		}

		function fazer_deposito() {
			var deposito = parseFloat(prompt('qual o valor para depósito?'));

			if (isNaN(deposito) || deposito <= 0) {
				alert("operação não autorizada");
				fazer_deposito();
			} else {
				saldo += deposito;
				extrato.push("depósito: +r$" + deposito);
				ver_saldo("ok");
			}
		}

		function fazer_saque(status) {
			if (status != "ok") {
				pedir_senha(fazer_saque);
			} else {
				var saque = parseFloat(prompt('qual o valor para saque?'));

				if (isNaN(saque) || saque <= 0 || saque > saldo) {
					alert("operação não autorizada");
					inicio();
				} else {
					saldo -= saque;
					extrato.push("saque: -r$" + saque);
					ver_saldo("ok");
				}
			}
		}

		function fazer_transferencia(status) {
			if (status != "ok") {
				pedir_senha(fazer_transferencia);
			} else {
				var conta = prompt("informe o número da conta:");

				if (isNaN(conta)) {
					alert("conta inválida");
					inicio();
				} else {
					var valor = parseFloat(prompt("qual o valor da transferência?"));

					if (isNaN(valor) || valor <= 0 || valor > saldo) {
						alert("operação não autorizada");
						inicio();
					} else {
						saldo -= valor;
						extrato.push("transferência para conta " + conta + ": -r$" + valor);
						ver_saldo("ok");
					}
				}
			}
		}

		function ver_extrato(status) {
			if (status != "ok") {
				pedir_senha(ver_extrato);
			} else {
				alert(extrato.join("\n"));
				inicio();
			}
		}

		function erro() {
			alert('por favor, informe um número entre 1 a 6');
			inicio();
		}

		function sair() {
			alert(nome + ", foi um prazer ter você por aqui!");
		}

		inicio();
	</script>
</head>

<body>

</body>

</html>
