<html>

<head>

	<script>
		var saldo = 100.5; //Float
		function inicio() {
			var nome = prompt("qual é seu nome?")
			var escolha = parseInt(prompt('Olá, ' + nome + '! é um prazer ter você por aqui! Selecione uma opção 1.) Saldo 2.) Depósito 3.) Saque 4.) Extrato 5.) Sair'));

			if (escolha === 1) {
				ver_saldo();
			} else if (escolha === 2) {
				fazer_deposito();
			} else if (escolha === 3) {
				fazer_saque();
			} else if (escolha === 4) {
				ver_extrato();
			} else if (escolha === 5) {
				sair();
			} else {
				erro();
			}
		}		

		function ver_saldo() {
			alert('Seu saldo atual é: ' + saldo);
			inicio();
		}

		function fazer_deposito() {
			var deposito = parseFloat(prompt('Qual o valor para depósito?'));
			// Not a Number
			if (isNaN(deposito) || deposito === '') {
				alert('Por favor, informe um número:');
				fazer_deposito();
			} else {
				saldo += deposito;
				ver_saldo();
			}
		}

		function fazer_saque() {
			var saque = parseFloat(prompt('Qual o valor para saque?'));
			if (isNaN(saque) || saque === '') {
				alert('Por favor, informe um número:');
				fazer_saque();
			} else if (saque > saldo) {
				alert("Operação não autorizada")

				ver_saldo();
			}
			 else {
				saldo -= saque;
				
				ver_saldo();
			}
		}

		function erro() {
			alert('Por favor, informe um número entre 1 e 4');
			//a ortografia está correta, não há necessidade de alteração.
			inicio();
		}

		function sair() {
			var confirma = confirm('Você deseja sair?');
			if (confirma) {
				window.close();
			} else {
				inicio();
			}
		}

		function ver_extrato() {
			extrato = ['PC caro ------ R$10.000', '\nrelógio caro ------ R$20.000', '\nroupa cara ------ R$30.000', '\nmarcelo ------ R$1']
			alert(extrato)
			ver_saldo();
		}
		
		
		inicio();
	</script>
</head>

</html>
